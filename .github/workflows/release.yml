name: Build extension release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v0.0.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and publish extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache Cargo build output
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Install Zed extension packager
        run: |
          cargo install \
            --git https://github.com/zed-industries/zed \
            --rev 97110fd5a119eb5fad49524dc04d7c042193e8ab \
            --package extension_cli \
            --bin zed-extension \
            --locked

      - name: Build and package extension
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag_name }}"
            version="${version#v}"
          fi

          mkdir -p dist scratch
          zed-extension \
            --source-dir . \
            --output-dir dist \
            --scratch-dir scratch

          mv dist/archive.tar.gz "dist/tsgo-${version}.tar.gz"
          mv dist/manifest.json "dist/tsgo-${version}.manifest.json"
          sha256sum "dist/tsgo-${version}.tar.gz" > "dist/tsgo-${version}.tar.gz.sha256"

          echo "asset_path=dist/tsgo-${version}.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "manifest_path=dist/tsgo-${version}.manifest.json" >> "${GITHUB_OUTPUT}"
          echo "checksum_path=dist/tsgo-${version}.tar.gz.sha256" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.package.outputs.asset_path }}
            ${{ steps.package.outputs.manifest_path }}
            ${{ steps.package.outputs.checksum_path }}
